types:
  Person:
    required:
    - name
  Agent:
    required:
    - name
    - role
  System:
    required:
    - name
    - purpose
  Project:
    required:
    - name
    - status
  Task:
    required:
    - title
    - status
  Preference:
    required:
    - key
    - value
  Account:
    required:
    - name
    - platform
  Session:
    required:
    - agent_id
    - session_path
  Rule:
    required:
    - title
    - content
  Document:
    required:
    - title
  Topic:
    required:
    - name
  RoleTag:
    required:
    - name
  PriorityTag:
    required:
    - name
  SummaryNote:
    required:
    - title
    - content
relations:
  has_owner:
    from_types:
    - Project
    - Task
    to_types:
    - Person
    - Agent
    cardinality: many_to_one
  supports:
    from_types:
    - Agent
    - System
    to_types:
    - Project
    - Task
    - System
    cardinality: many_to_many
  prefers:
    from_types:
    - Person
    to_types:
    - Preference
    cardinality: one_to_many
  works_on:
    from_types:
    - Agent
    to_types:
    - Project
    - Task
    cardinality: many_to_many
  uses_account:
    from_types:
    - Agent
    - Person
    to_types:
    - Account
    cardinality: many_to_many
  has_session:
    from_types:
    - Agent
    - Account
    to_types:
    - Session
    cardinality: one_to_many
  follows_rule:
    from_types:
    - Agent
    - System
    - Person
    to_types:
    - Rule
    cardinality: many_to_many
  documents:
    from_types:
    - Session
    - Document
    - SummaryNote
    - Rule
    to_types:
    - Project
    - System
    - Rule
    - Agent
    cardinality: many_to_many
  about:
    from_types:
    - Session
    - Document
    - SummaryNote
    to_types:
    - Topic
    - Project
    - System
    cardinality: many_to_many
  tagged_as:
    from_types:
    - Session
    - Agent
    - Account
    to_types:
    - RoleTag
    - PriorityTag
    cardinality: many_to_many
  summarized_by:
    from_types:
    - Session
    to_types:
    - SummaryNote
    cardinality: one_to_many
